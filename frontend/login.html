<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Safeguard against platform or wrapper code overriding read-only window.fetch
    (function() {
      const originalFetch = window.fetch;
      let currentFetch = originalFetch;
      try {
        Object.defineProperty(window, 'fetch', {
          get() { return currentFetch; },
          set(val) { currentFetch = val; },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Redefine fetch descriptor fallback aborted:", e);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - BeautyHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <id id="login-page-identifier"></id>
</head>
<body>

  <!-- HEADER NAVIGATION -->
  <header>
    <div class="nav-container">
      <a href="/" class="logo">
        <span>❤</span> BEAUTY<span>HUB</span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/products.html">Shop All</a>
      </nav>
      <div class="nav-actions">
        <a href="/cart.html" class="cart-btn" title="Shopping Bag">
          <svg style="width:22px; height:22px; fill:currentColor" viewBox="0 0 24 24"><path d="M17.21 9l-4.3-6.45c-.2-.29-.53-.45-.88-.45-.35 0-.68.16-.88.45L6.85 9H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2h-2.79zM12 4.4L15.07 9H8.93L12 4.4zM20 19H4v-8h16v8zm-8-2c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/></svg>
          <span class="cart-count" id="cart-badge">0</span>
        </a>
        <div id="header-user-container">
          <div class="loader-spinner" style="width:16px; height:16px; margin:0;"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- AUTH CARD CONTAINER -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div style="font-size:38px; color:var(--accent); margin-bottom:12px;">❤</div>
        <h2>Join <span>BeautyHub</span></h2>
        <p>Unlock personalized skincare recommendations, save items dynamically, and check out with ease using Google Auth.</p>
      </div>

      <!-- Real Google Log in Button -->
      <button class="btn-google" id="btn-google-login">
        <svg viewBox="0 0 24 24" y="0px" x="0px" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-3.3-4.53-6.16-4.53z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

    </div>
  </main>

  <!-- LUXURY FOOTER -->
  <footer>
    <div class="footer-content">
      <div class="footer-brand">
        <h2>❤ BEAUTY<span>HUB</span></h2>
        <p>&copy; 2026 BeautyHub Inc.</p>
      </div>
    </div>
  </footer>

  <!-- ACTION LOG IN BUTTON TRIGGERS -->
  <script>
    document.getElementById("btn-google-login").addEventListener("click", () => {
      startGoogleLogin();
    });

    // Handle Redirection if already logged in
    window.addEventListener("authStateChanged", (e) => {
      if (e.detail) {
        // Logined, send back
        window.location.href = "/";
      }
    });
  </script>

  <!-- SCRIPTS -->
  <script src="/js/cart.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
